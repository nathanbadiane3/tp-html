<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .content-rectangle {
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }

        .enfant {
            border: 2px solid blue;
            height: 200px;
            width: 45%;
        }

        .rectangle {
            height: 200px;
            border: 2px solid blue;
        }

        .minirec {

            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .r1 {
            height: 200px;
            width: 200px;
            border: 2px solid darkblue;

        }

        .minirec2 {

            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            margin-top: 10px;
        }

        .r2 {
            height: 200px;
            width: 200px;
            border: 2px solid darkblue;

        }

        .rectangle2 {
            height: 200px;
            width: 100%;
            border: 3px solid green;
            margin-top: 20px;
        }

        .cercle {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;

        }

        .c1 {
            height: 200px;
            width: 200px;
            border: solid 3px orchid;
            border-radius: 50%;
        }

        .content-rectangle2 {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            margin-top: 10px;
        }

        .enfant2 {
            border: 2px solid blue;
            height: 200px;
            width: 45%;
        }

        .rectcerle {
            display: flex;
            justify-content: space-between;
        }

        .enfant3 {
            border: 2px solid blue;
            height: 200px;
            width: 30%;
        }

        .c3 {
            height: 150px;
            width: 150px;
            border: solid 3px orchid;
            border-radius: 50%;
            ;
        }
    </style>
</head>

<body>
    <div class="content-rectangle">
        <div class="enfant"></div>
        <div class="enfant"></div>
    </div>
    <div class="rectangle"></div>

    <div class="minirec">
        <div class="r1"></div>
        <div class="r1"></div>
        <div class="r1"></div>


    </div>
    <div class="minirec2">
        <div class="r2"></div>
        <div class="r2"></div>
        <div class="r2"></div>

    </div>
    <div class="rectangle2"></div>

    <div class="cercle">
        <div class="c1"></div>
        <div class="c1"></div>
        <div class="c1"></div>
        <div class="c1"></div>
    </div>
    <div class="content-rectangle2">
        <div class="enfant2"></div>
        <div class="enfant2"></div>
    </div>
    <div class="rectcerle">
        <div class="enfant3"></div>
        <div class="c3"></div>
        <div class="c3"></div>
    </div>
</body>

</html>
