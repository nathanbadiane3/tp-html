<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
        }
        body{
            padding-top: 100px;
        }

        .mo {
            display: flex;
            width: 30%;
            justify-content: space-around;

        }

        .petitcercle {
            border-radius: 50px;
            border: 3px solid black;
            height: 20px;
            width: 20px;
            margin-left: 20px;
        }

        .petitcarre {
            border: 2px solid black;
            width: 20%;
            border-radius: 5px;
            height: 10px;


        }

        .ligne {
            border: 2px solid black;
            margin-top: 10px;
        }

        .grosrectangle {
            border: 2px solid black;
            height: 350px;
            width: 95%;
            margin-top: 15px;
            margin: 30px auto;
            border-radius: 12px;
        }

        .petitrec {
            width: 15%;
            height: 15px;
            border: 2px solid black;
            margin: 15px auto;
            border-radius: 12px;
        }

        .gros4carre {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: auto
        }

        .groscarre {
            width: 43%;
            height: 300px;
            border: 2px solid black;
            border-radius: 12px;
            margin: 20px auto;


        }

        .gros6carre {
            flex-wrap: wrap;
            display: flex;

        }

        .gros1carre {
            width: 27%;
            height: 200px;
            border: 2px solid black;
            border-radius: 12px;
            margin: 10px auto;

        }

        .groscarre1 {
            display: flex;
        }

        .gros12carre {
            width: 20%;
            height: 100px;
            border: 2px solid black;
            border-radius: 12px;
            margin: 10px auto;
        }

        .grosrectangle1 {
            border: 2px solid black;
            height: 350px;
            width: 93%;
            margin-top: 15px;
            margin: 20px auto;
            border-radius: 12px;
            
        }

        .petitrec1 {
            width: 15%;
            height: 15px;
            
            margin: 15px auto;
            border-radius: 12px;
            display:flex;
            justify-content: space-between;

        }

        .point {
            width: 10px;
            height: 10px;
            border: 2px solid black;
            border-radius: 50px;
            
        }

        .grosrectangle2 {
            border: 2px solid black;
            height: 80px;
            width: 93%;
            margin-top: 15px;
            margin: 20px auto;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <div class="menu">
        <div class="petitcercle"></div>
        <div class="mo">
            <div class="petitcarre"></div>
            <div class="petitcarre"></div>
            <div class="petitcarre"></div>
            <div class="petitcarre"></div>
        </div>
        
    </div>
    <div class="ligne"></div>
    <div class="grosrectangle"></div>

    <div class="petitrec"></div>
    <div class="gros4carre">
        <div class="groscarre"></div>
        <div class="groscarre"></div>
        <div class="groscarre"></div>
        <div class="groscarre"></div>
    </div>

    <div class="petitrec"></div>
    <div class="gros6carre">
        <div class="gros1carre"></div>
        <div class="gros1carre"></div>
        <div class="gros1carre"></div>
        <div class="gros1carre"></div>
        <div class="gros1carre"></div>
        <div class="gros1carre"></div>

    </div>
    <div class="petitrec"></div>
    <div class="groscarre1">
        <div class="gros12carre"></div>
        <div class="gros12carre"></div>
        <div class="gros12carre"></div>
        <div class="gros12carre"></div>
    </div>
    <div class="grosrectangle1"></div>
    <div class="petitrec1">
        <div class="point"></div>
        <div class="point"></div>
        <div class="point"></div>
        <div class="point"></div>
    </div>
    <div class="grosrectangle2"></div>
</body>

</html>
